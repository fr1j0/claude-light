name: CI

# Runs the test suite on every PR to main (and on main itself) so `swift test`
# can be a required status check for merging.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: swift test
        run: swift test
